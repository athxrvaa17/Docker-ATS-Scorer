<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI ATS Pro Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --success: #10b981;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .dashboard {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 2rem;
            width: 100%;
            max-width: 900px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            text-align: center;
            margin-bottom: 2rem;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Tabs Styling */
        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 1rem;
        }
        .tab-btn {
            background: transparent;
            color: var(--text-main);
            border: none;
            padding: 0.5rem 1rem;
            cursor: pointer;
            font-size: 1.1rem;
            border-radius: 8px;
            transition: 0.3s;
        }
        .tab-btn.active {
            background: var(--accent);
            font-weight: bold;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        textarea {
            width: 100%;
            height: 150px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            box-sizing: border-box;
        }

        button.action-btn {
            width: 100%;
            padding: 1rem;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background 0.3s;
            margin-bottom: 1rem;
        }
        button.action-btn:hover { background: var(--accent-hover); }

        /* Results Section */
        .result-box {
            margin-top: 2rem;
            padding: 1.5rem;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            border: 1px solid var(--success);
            display: none;
        }

        .score-circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: var(--success);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            margin: 0 auto 1rem;
        }

        .chart-container {
            width: 100%;
            max-width: 400px;
            margin: 2rem auto;
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <h1>AI ATS Pro 🚀</h1>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('single')">Single Analysis</button>
            <button class="tab-btn" onclick="switchTab('compare')">A/B Compare</button>
        </div>

        <div id="single" class="tab-content active">
            <textarea id="jd_single" placeholder="Paste Job Description here..."></textarea>
            <textarea id="resume_single" placeholder="Paste Resume here..."></textarea>
            <button class="action-btn" onclick="analyzeSingle()">Analyze Match</button>
            
            <div id="single_result" class="result-box">
                <div class="score-circle" id="ats_score">0%</div>
                <h3 style="text-align:center;" id="hiring_prob"></h3>
                
                <div class="chart-container">
                    <canvas id="skillsChart"></canvas>
                </div>

                <h3>🤖 AI Generated Interview Questions:</h3>
                <ul id="interview_q_list"></ul>
            </div>
        </div>

        <div id="compare" class="tab-content">
            <textarea id="jd_compare" placeholder="Paste Job Description here..."></textarea>
            <textarea id="resume1" placeholder="Paste Resume 1 here..."></textarea>
            <textarea id="resume2" placeholder="Paste Resume 2 here..."></textarea>
            <button class="action-btn" onclick="analyzeCompare()">Compare Resumes</button>

            <div id="compare_result" class="result-box">
                <h2 id="winner_name" style="color: var(--success); text-align: center;"></h2>
                <p><strong>Resume 1 Score:</strong> <span id="r1_score"></span></p>
                <p><strong>Resume 2 Score:</strong> <span id="r2_score"></span></p>
                <p><strong>AI Verdict:</strong> <span id="compare_reason"></span></p>
            </div>
        </div>
    </div>

    <script>
        // API URL - LOCALHOST KE LIYE. Cloud par host karne ke baad ise badal dena!
        const API_BASE_URL = "http://localhost:8000";
        let myChart = null; // Chart instance

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.target.classList.add('active');
        }

        async function analyzeSingle() {
            const btn = event.target;
            btn.innerText = "Analyzing... Please wait ⏳";
            btn.disabled = true;

            const payload = {
                job_description: document.getElementById('jd_single').value,
                resume_text: document.getElementById('resume_single').value
            };

            try {
                const response = await fetch(`${API_BASE_URL}/analyze_resume`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const resData = await response.json();
                const data = resData.data;

                // UI Update
                document.getElementById('single_result').style.display = 'block';
                document.getElementById('ats_score').innerText = data.ats_score + '%';
                document.getElementById('hiring_prob').innerText = "Hiring Probability: " + data.hiring_probability;

                // Update Questions List
                const qList = document.getElementById('interview_q_list');
                qList.innerHTML = "";
                data.interview_questions.forEach(q => {
                    let li = document.createElement('li');
                    li.innerText = q;
                    li.style.marginBottom = "10px";
                    qList.appendChild(li);
                });

                // Update Radar Chart
                updateChart(data.chart_data);

            } catch (error) {
                alert("Error connecting to backend! Is Docker running?");
            } finally {
                btn.innerText = "Analyze Match";
                btn.disabled = false;
            }
        }

        async function analyzeCompare() {
            const btn = event.target;
            btn.innerText = "Comparing Profiles... ⏳";
            btn.disabled = true;

            const payload = {
                job_description: document.getElementById('jd_compare').value,
                resume_1_text: document.getElementById('resume1').value,
                resume_2_text: document.getElementById('resume2').value
            };

            try {
                const response = await fetch(`${API_BASE_URL}/compare_resumes`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const resData = await response.json();
                const data = resData.data;

                document.getElementById('compare_result').style.display = 'block';
                document.getElementById('winner_name').innerText = "🏆 Winner: " + data.winner;
                document.getElementById('r1_score').innerText = data.resume_1_score + "%";
                document.getElementById('r2_score').innerText = data.resume_2_score + "%";
                document.getElementById('compare_reason').innerText = data.detailed_reason;

            } catch (error) {
                alert("Error connecting to backend!");
            } finally {
                btn.innerText = "Compare Resumes";
                btn.disabled = false;
            }
        }

        function updateChart(chartData) {
            const ctx = document.getElementById('skillsChart').getContext('2d');
            
            if(myChart) myChart.destroy(); // Purana chart delete karo naya banane se pehle

            myChart = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['Technical Skills', 'Soft Skills', 'Experience Match'],
                    datasets: [{
                        label: 'Match Percentage',
                        data: [chartData.technical_skills, chartData.soft_skills, chartData.experience_match],
                        backgroundColor: 'rgba(59, 130, 246, 0.4)',
                        borderColor: '#3b82f6',
                        pointBackgroundColor: '#10b981',
                        pointBorderColor: '#fff',
                        pointHoverBackgroundColor: '#fff',
                        pointHoverBorderColor: '#10b981'
                    }]
                },
                options: {
                    scales: {
                        r: {
                            angleLines: { color: 'rgba(255, 255, 255, 0.2)' },
                            grid: { color: 'rgba(255, 255, 255, 0.2)' },
                            pointLabels: { color: '#f8fafc', font: { size: 14 } },
                            ticks: { display: false, min: 0, max: 100 }
                        }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }
    </script>
</body>
</html>
