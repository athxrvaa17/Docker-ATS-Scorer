<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI ATS & Career Strategist</title>
    <style>
        /* Modern Dark Theme & Typography */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Orbitron:wght@500;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #0d0d0f;
            color: #ffffff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Background Animated Blobs to make Glassmorphism pop */
        .blob {
            position: absolute;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.6;
            animation: float 10s infinite alternate ease-in-out;
        }
        .blob-1 { top: 10%; left: 20%; width: 300px; height: 300px; background: #32D74B; }
        .blob-2 { bottom: 10%; right: 20%; width: 400px; height: 400px; background: #0A84FF; }

        @keyframes float {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        /* --- LIQUIDGLASS CORE STYLES --- */
        .glass-panel {
            background: rgba(30, 30, 30, 0.4);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            border-radius: 24px;
            padding: 40px;
            z-index: 10;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* --- VIEW 1: INPUT FORM --- */
        #input-view {
            width: 500px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        h2 { font-weight: 600; letter-spacing: 1px; margin-bottom: 10px; }

        textarea {
            width: 100%;
            height: 120px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            padding: 15px;
            font-size: 14px;
            resize: none;
            outline: none;
            transition: border 0.3s ease;
        }

        textarea:focus { border: 1px solid #0A84FF; }

        button.action-btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 15px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        button.action-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        /* --- VIEW 2: THE GIANT BUBBLE --- */
        #bubble-view {
            display: none;
            width: 250px;
            height: 250px;
            border-radius: 50%;
            display: none; /* Changed via JS */
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            text-align: center;
        }

        #bubble-view:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(10, 132, 255, 0.4);
        }

        .score-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 64px;
            font-weight: 700;
            background: -webkit-linear-gradient(#fff, #aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .click-hint {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* --- VIEW 3: EXPANDED DETAILS --- */
        #details-view {
            display: none;
            width: 800px;
            max-height: 80vh;
            overflow-y: auto;
        }

        /* Custom Scrollbar for Glass UI */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

        .info-group { margin-bottom: 25px; }
        .info-group h3 { color: #0A84FF; font-size: 16px; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px;}
        .info-group p { color: #d1d1d6; line-height: 1.6; font-size: 15px;}
        
        .tag-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 5px;}
        .tag {
            background: rgba(255, 59, 48, 0.2);
            border: 1px solid rgba(255, 59, 48, 0.3);
            color: #ff453a;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 13px;
        }

        .tech-card {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 12px;
            margin-top: 10px;
        }
        .tech-card h4 { color: #32D74B; margin-bottom: 5px;}
        .tech-card a { color: #0A84FF; text-decoration: none; font-size: 13px; display: inline-block; margin-top: 8px;}
        .tech-card a:hover { text-decoration: underline; }

        /* Utility */
        .hidden { display: none !important; }
        .loader { border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid #0A84FF; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto; display: none;}
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div id="input-view" class="glass-panel">
        <h2>AI Resume Analyzer</h2>
        <textarea id="jd" placeholder="Paste Job Description here..."></textarea>
        <textarea id="resume" placeholder="Paste your Resume text here..."></textarea>
        <button class="action-btn" onclick="analyzeResume()">Analyze Match</button>
        <div id="loading" class="loader" style="margin-top: 15px;"></div>
    </div>

    <div id="bubble-view" class="glass-panel" onclick="expandDetails()">
        <div class="score-text" id="display-score">0%</div>
        <div class="click-hint">Click to Expand</div>
    </div>

    <div id="details-view" class="glass-panel">
        <h2 style="font-family: 'Orbitron', sans-serif; font-size: 32px; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px;">
            ATS Score: <span id="detail-score" style="color: #32D74B;">0%</span>
        </h2>
        
        <div class="info-group">
            <h3>Hiring Probability</h3>
            <p><span id="hiring-prob" style="font-weight: bold; color: white;"></span> - <span id="hiring-reason"></span></p>
        </div>

        <div class="info-group">
            <h3>Missing Keywords</h3>
            <div class="tag-container" id="missing-tags"></div>
        </div>

        <div class="info-group">
            <h3>Trending Tech You Must Learn</h3>
            <div id="trending-tech-container"></div>
        </div>

        <div class="info-group">
            <h3>Future Scope of this Role</h3>
            <p id="future-scope-text"></p>
        </div>
        
        <button class="action-btn" style="margin-top: 20px; width: 100%;" onclick="resetApp()">Analyze Another</button>
    </div>

    <script>
        // Global variable to store API data
        let apiData = null;

        // Function to call your Docker Backend
        async function analyzeResume() {
            const jdText = document.getElementById('jd').value;
            const resumeText = document.getElementById('resume').value;
            
            if(!jdText || !resumeText) {
                alert("Please enter both Job Description and Resume!");
                return;
            }

            document.getElementById('loading').style.display = 'block';

            try {
                // Pointing to your Docker Container's local address
                const response = await fetch('http://localhost:8000/analyze_resume', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        job_description: jdText,
                        resume_text: resumeText
                    })
                });

                const result = await response.json();
                
                if(result.status === "success") {
                    apiData = result.data;
                    showBubble();
                } else {
                    alert("API Error: " + result.error);
                }
            } catch (error) {
                alert("Failed to connect to backend. Make sure your Docker container is running on port 8000! Error: " + error.message);
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        // Switch to View 2 (The Bubble)
        function showBubble() {
            document.getElementById('input-view').style.display = 'none';
            
            const bubble = document.getElementById('bubble-view');
            bubble.style.display = 'flex';
            
            // Set the score
            document.getElementById('display-score').innerText = apiData.ats_score + '%';
        }

        // Switch to View 3 (Expanded Details)
        function expandDetails() {
            document.getElementById('bubble-view').style.display = 'none';
            
            const details = document.getElementById('details-view');
            details.style.display = 'block';

            // Populate Data
            document.getElementById('detail-score').innerText = apiData.ats_score + '%';
            document.getElementById('hiring-prob').innerText = apiData.hiring_probability;
            
            // Set color based on probability
            const probEl = document.getElementById('hiring-prob');
            if(apiData.hiring_probability === "High") probEl.style.color = "#32D74B";
            else if(apiData.hiring_probability === "Medium") probEl.style.color = "#FF9F0A";
            else probEl.style.color = "#FF453A";

            document.getElementById('hiring-reason').innerText = apiData.reason || "Based on current market analysis.";
            document.getElementById('future-scope-text').innerText = apiData.future_scope;

            // Render Missing Keywords Tags
            const tagsContainer = document.getElementById('missing-tags');
            tagsContainer.innerHTML = '';
            apiData.missing_keywords.forEach(keyword => {
                const span = document.createElement('span');
                span.className = 'tag';
                span.innerText = keyword;
                tagsContainer.appendChild(span);
            });

            // Render Trending Tech Cards
            const techContainer = document.getElementById('trending-tech-container');
            techContainer.innerHTML = '';
            apiData.trending_tech_to_learn.forEach(tech => {
                const card = document.createElement('div');
                card.className = 'tech-card';
                card.innerHTML = `
                    <h4>${tech.tech_name}</h4>
                    <p>${tech.reason}</p>
                    <a href="https://www.youtube.com/results?search_query=${encodeURIComponent(tech.learning_link)}" target="_blank">
                        ▶ ${tech.learning_link}
                    </a>
                `;
                techContainer.appendChild(card);
            });
        }

        // Reset back to Form
        function resetApp() {
            document.getElementById('details-view').style.display = 'none';
            document.getElementById('jd').value = '';
            document.getElementById('resume').value = '';
            document.getElementById('input-view').style.display = 'flex';
        }
    </script>
</body>
</html>
